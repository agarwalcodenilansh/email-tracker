<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MailTrack — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .card {
    position: relative; z-index: 1;
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(0,212,170,0.05);
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #00d4aa;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: #00d4aa;
    border-radius: 50%;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .sub {
    font-size: 14px;
    color: #666;
    margin-bottom: 36px;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #888;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: #e8e8e8;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus { border-color: #00d4aa; }
  input::placeholder { color: #444; }
  .btn {
    width: 100%;
    background: #00d4aa;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    margin-top: 8px;
    transition: opacity 0.2s;
    letter-spacing: 0.01em;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: #ff6b6b;
    margin-bottom: 18px;
    display: none;
  }
  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 13px;
    color: #555;
  }
  .footer a { color: #00d4aa; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="logo">MailTrack</div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your dashboard</p>
  <div class="error" id="err"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn" id="btn" onclick="login()">Sign in</button>
  <div class="footer">No account? <a href="/register">Create one</a></div>
</div>
<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    err.style.display = 'none';
    if (!email || !password) { showErr('Please fill in all fields'); return; }
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
      const r = await fetch('/api/login', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();
      if (!r.ok) { showErr(d.error); btn.disabled = false; btn.textContent = 'Sign in'; return; }
      window.location.href = '/';
    } catch(e) { showErr('Connection error'); btn.disabled = false; btn.textContent = 'Sign in'; }
  }
  function showErr(msg) {
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
  }
</script>
</body>
</html>
